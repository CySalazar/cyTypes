name: Security Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0"

      - name: Restore
        run: dotnet restore tests/CyTypes.Security.Tests/CyTypes.Security.Tests.csproj

      - name: Build
        run: dotnet build tests/CyTypes.Security.Tests/CyTypes.Security.Tests.csproj --no-restore -c Release

      - name: Run Security Tests
        run: dotnet test tests/CyTypes.Security.Tests/CyTypes.Security.Tests.csproj --no-build -c Release --logger "trx;LogFileName=security-results.trx" --results-directory ./TestResults

      - name: Upload Security Test Results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: security-test-results
          path: "./TestResults/**"
